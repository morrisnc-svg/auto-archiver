name: Run Auto Archiver

on:
  workflow_dispatch:

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies (ffmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Auto Archiver
        run: |
          pip install --upgrade pip
          pip install auto-archiver

      - name: Install Browser Dependencies for Screenshots
        run: |
          playwright install-deps

      - name: Create Google Credentials File
        run: |
          cat << 'EOF' > google_creds.json
          ${{ secrets.GOOGLE_CRD }}
          EOF

      - name: Execute Archiver Run
        run: |
          auto-archiver --config orchestration.yaml
